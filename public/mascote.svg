<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <radialGradient id="pinShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#053e26" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#053e26" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="70%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="pinInnerShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="jerseyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="100%" stop-color="#FDD835"/>
    </linearGradient>
    <linearGradient id="gloveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <linearGradient id="strapGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>

  <!-- Ground / Ambient Shadow -->
  <ellipse cx="256" cy="480" rx="140" ry="20" fill="url(#pinShadow)"/>

  <!-- Body / Brazil Soccer Jersey Details -->
  <g id="body">
    <!-- Neck -->
    <rect x="236" y="270" width="40" height="40" fill="#ECEFF1" rx="5"/>
    <path d="M236,300 C236,300 256,315 276,300 L276,310 C276,310 256,325 236,310 Z" fill="#CFD8DC"/>
    
    <!-- Torso (Yellow Jersey) -->
    <path d="M166,330 C156,340 156,380 156,470 L356,470 C356,380 356,340 346,330 C326,310 286,305 256,305 C226,305 186,310 166,330 Z" fill="url(#jerseyGradient)" stroke="#F57F17" stroke-width="2"/>
    
    <!-- Green V-Neck Collar -->
    <path d="M226,305 L286,305 L256,340 Z" fill="#4CAF50"/>
    <path d="M226,305 L256,340 L286,305" fill="none" stroke="#2E7D32" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Strap (Crossbody Bag) -->
    <path d="M176,330 L313,470" stroke="url(#strapGradient)" stroke-width="14" stroke-linecap="round"/>
    <path d="M179,328 L316,468" stroke="#3E2723" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- CBF-style Logo Shield on the Chest (Left Side) -->
    <g transform="translate(200, 360) scale(0.65)">
      <!-- Stars (5 Green Stars in Arch) -->
      <path d="M-15,-20 L-13,-14 L-7,-14 L-12,-10 L-10,-4 L-15,-8 L-20,-4 L-18,-10 L-23,-14 L-17,-14 Z" fill="#ffca28"/>
      <path d="M-5,-25 L-3,-19 L3,-19 L-2,-15 L0,-9 L-5,-13 L-10,-9 L-8,-15 L-13,-19 L-7,-19 Z" fill="#ffca28"/>
      <path d="M10,-25 L12,-19 L18,-19 L13,-15 L15,-9 L10,-13 L5,-9 L7,-15 L2,-19 L8,-19 Z" fill="#ffca28"/>
      <path d="M25,-20 L27,-14 L33,-14 L28,-10 L30,-4 L25,-8 L20,-4 L22,-10 L17,-14 L23,-14 Z" fill="#ffca28"/>

      <!-- Shield Background -->
      <path d="M-25,0 L25,0 C25,25 15,40 0,50 C-15,40 -25,25 -25,0 Z" fill="#FFFFFF" stroke="#0D47A1" stroke-width="3"/>
      <path d="M-20,3 L20,3 C20,22 12,35 0,44 C-12,35 -20,22 -20,3 Z" fill="#0D47A1"/>
      <path d="M-15,6 L15,6 C15,18 10,30 0,38 C-10,30 -15,18 -15,6 Z" fill="#ffca28"/>
      <!-- Inner Green Stripe -->
      <path d="M-5,6 L5,6 L5,34 L-5,34 Z" fill="#4CAF50"/>
      <!-- Text label (A or +) -->
      <text x="0" y="24" font-family="'Inter', sans-serif" font-weight="900" font-size="20" fill="#FFFFFF" text-anchor="middle">A</text>
    </g>

    <!-- Logo on Chest (Right Side) -->
    <g transform="translate(290, 375) scale(0.6)">
      <!-- Infinity Like Symbol -->
      <path d="M-20,0 C-35,-15 -35,15 -20,0 C-5,-15 5,-15 20,0 C35,15 35,-15 20,0 C5,15 -5,15 -20,0 Z" fill="none" stroke="#2E7D32" stroke-width="6"/>
      <circle cx="0" cy="-5" r="5" fill="#E53935"/>
    </g>

    <!-- Arms & Hands -->
    <!-- Left Arm gesturing open -->
    <path d="M166,340 C120,370 100,410 70,420" fill="none" stroke="url(#jerseyGradient)" stroke-width="24" stroke-linecap="round"/>
    <path d="M70,420 Q50,425 40,410" fill="none" stroke="url(#gloveGradient)" stroke-width="20" stroke-linecap="round"/>
    <!-- Left Hand Fingers (cartoonish open palm) -->
    <circle cx="34" cy="402" r="6" fill="#455A64"/>
    <circle cx="30" cy="412" r="6" fill="#37474F"/>
    <circle cx="32" cy="424" r="6" fill="#263238"/>
    <circle cx="40" cy="432" r="5" fill="#212121"/>

    <!-- Right Arm with Thumbs Up! -->
    <path d="M346,340 C380,360 410,390 420,410" fill="none" stroke="url(#jerseyGradient)" stroke-width="24" stroke-linecap="round"/>
    <!-- Right Glove Glove -->
    <path d="M420,410 Q440,415 450,400" fill="none" stroke="url(#gloveGradient)" stroke-width="20" stroke-linecap="round"/>
    <!-- Thumbs-up details -->
    <!-- Thumb pointing up -->
    <path d="M445,372 C440,362 452,360 455,372 L452,388 Z" fill="#546E7A" stroke="#212121" stroke-width="2"/>
    <!-- Knuckles folded -->
    <rect x="452" y="388" width="16" height="6" rx="3" fill="#37474F"/>
    <rect x="450" y="394" width="16" height="6" rx="3" fill="#263238"/>
    <rect x="446" y="400" width="15" height="5" rx="2" fill="#212121"/>
  </g>

  <!-- Teardrop Location Pin Head (Teardrop shape) -->
  <g id="map-pin-head" transform="translate(0, -10)">
    <!-- 3D Shadow under Head -->
    <ellipse cx="256" cy="275" rx="35" ry="12" fill="#000" fill-opacity="0.25"/>

    <!-- Outer Pin Frame -->
    <path d="M256,270 C366,190 376,140 376,120 C376,54 322,0 256,0 C190,0 136,54 136,120 C136,140 146,190 256,270 Z" fill="url(#pinGradient)" stroke="#B71C1C" stroke-width="3" filter="drop-shadow(0px 8px 16px rgba(0,0,0,0.25))"/>
    
    <!-- Glossy Highlight Arch on Pin Left -->
    <path d="M150,110 C150,60 190,20 250,20" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.4"/>

    <!-- Center White Pinhole (transparent/cut-out look) -->
    <circle cx="256" cy="110" r="50" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.1" stroke-width="2"/>
    <!-- Inner depth shadow for pin hole -->
    <circle cx="256" cy="110" r="43" fill="#ECEFF1"/>
    <circle cx="256" cy="110" r="43" fill="url(#pinInnerShadow)"/>
  </g>
</svg>
